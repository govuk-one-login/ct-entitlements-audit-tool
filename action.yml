name: Entitlements Query
description: Query user permissions across AWS accounts from entitlements configuration

inputs:
  query_type:
    description: "Query type: user, email, account, role, permission, list-users, list-roles"
    required: true
  parameter:
    description: "User alias, email, account name, role name, or permission name"
    required: false
    default: ""
  account:
    description: "Account name (only for 'user' query to filter by account)"
    required: false
    default: ""
  base_path:
    description: "Path to the terraform directory containing entitlements data"
    required: false
    default: "terraform"

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: pip install pyyaml python-hcl2

    - name: Build query arguments
      id: args
      shell: bash
      run: |
        ARGS="--base-path ${{ inputs.base_path }} ${{ inputs.query_type }}"
        [ -n "${{ inputs.parameter }}" ] && ARGS="$ARGS ${{ inputs.parameter }}"
        [ -n "${{ inputs.account }}" ] && ARGS="$ARGS ${{ inputs.account }}"
        echo "value=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Run entitlements query
      shell: bash
      run: |
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        python ${{ github.action_path }}/entitlements.py ${{ steps.args.outputs.value }} | tee output.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Generate CSV
      shell: bash
      run: python ${{ github.action_path }}/entitlements.py --format csv ${{ steps.args.outputs.value }} > entitlements-query-result.csv

    - name: Upload CSV artifact
      uses: actions/upload-artifact@v4
      with:
        name: entitlements-query-result
        path: entitlements-query-result.csv
