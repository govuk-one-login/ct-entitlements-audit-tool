---
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    target-branch: "main"
    reviewers:
      - "govuk-one-login/fog"
    labels:
      - "dependencies"
      - "python"
    # See https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference#groups--
    groups:
      applies-to: version-updates
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    target-branch: "main"
    reviewers:
      - "govuk-one-login/fog"
    labels:
      - "dependencies"
      - "github-actions"
